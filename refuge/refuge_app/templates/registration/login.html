<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion refuge</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f6f7fb; color: #222; }
        .login-card { max-width: 420px; margin: 80px auto; background: white; padding: 28px; border-radius: 12px; box-shadow: 0 4px 12px #0001; }
        label { display: block; margin-top: 14px; font-weight: bold; }
        input { width: 100%; padding: 10px; margin-top: 6px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { margin-top: 20px; width: 100%; background: #4f6bed; color: white; border: none; border-radius: 8px; padding: 12px 16px; cursor: pointer; }
        .error { background: #ffecec; color: #8a1f1f; padding: 12px; border-radius: 8px; }
    </style>
</head>
<body>
    <main class="login-card">
        <h1>Connexion refuge</h1>
        <p>Connecte-toi pour accéder au tableau de bord du refuge.</p>

        {% if form.errors %}
            <p class="error">Identifiant ou mot de passe incorrect.</p>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <label for="id_username">Identifiant</label>
            {{ form.username }}

            <label for="id_password">Mot de passe</label>
            {{ form.password }}

            <button type="submit">Se connecter</button>
        </form>
    </main>
</body>
</html>
